            align-items: center;
            padding: 2rem;

        .main-title {
            font-size: 3.5rem;

            /* El efecto neón se consigue con múltiples sombras de texto */
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-pink),
                0 0 30px var(--neon-pink),
                0 0 40px var(--neon-pink),
                0 0 55px var(--neon-pink),
                0 0 75px var(--neon-pink);
            transition: text-shadow 0.1s ease-in-out;
        }

        .flicker {
            text-shadow:
                0 0 5px #fff,
                0 0 8px #fff,
                0 0 15px var(--neon-pink),
                0 0 20px var(--neon-pink);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            margin-top: 0.5rem;
        }

        #car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .car-card {
            background-color: var(--card-background);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            overflow: hidden;
            /* La sombra de la caja da el resplandor a la tarjeta entera */
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.5), inset 0 0 10px rgba(0, 170, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .car-card:hover {

    <script>
        // Pequeño script para hacer que el título principal parpadee como un letrero de neón
        const title = document.getElementById('mainTitle');

        setInterval(() => {
            // El 10% de las veces, aplica el efecto de parpadeo
            if (Math.random() < 0.1) {
                title.classList.add('flicker');
                
                // Quita el efecto después de un instante
                setTimeout(() => {
                    title.classList.remove('flicker');
                }, 150); // Duración del parpadeo
            }
        }, 500); // Revisa cada medio segundo
    </script>
